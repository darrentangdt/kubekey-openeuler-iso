name: GenRepositoryISO
on:
  push:
    tags:
      - 'iso-latest'
  workflow_dispatch:

jobs:
  update-tag:
    name: Update iso-latest Tag
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check or update iso-latest tag
        shell: bash
        run: |
          CURRENT_TAG_SHA=$(git rev-parse iso-latest 2>/dev/null || echo "")
          LATEST_MAIN_SHA=$(git rev-parse origin/main)

          if [ "$CURRENT_TAG_SHA" = "$LATEST_MAIN_SHA" ]; then
            echo "Tag is already up-to-date, skipping update"
          else
            echo "Updating iso-latest tag to latest main commit ($LATEST_MAIN_SHA)"
            git tag -d iso-latest 2>/dev/null || true
            git tag -f iso-latest origin/main
            git push origin :refs/tags/iso-latest 2>/dev/null || true
            git push origin --tags
          fi

  build-iso:
    runs-on: ubuntu-latest
    needs: update-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: openeuler-22.03-lts-rpms
            dockerfile: dockerfile.openeuler2203
          - name: openeuler-22.03-lts-sp1-rpms
            dockerfile: dockerfile.openeuler2203sp1
          - name: openeuler-22.03-lts-sp2-rpms
            dockerfile: dockerfile.openeuler2203sp2
          - name: openeuler-22.03-lts-sp3-rpms
            dockerfile: dockerfile.openeuler2203sp3
          - name: openeuler-22.03-lts-sp4-rpms
            dockerfile: dockerfile.openeuler2203sp4
          - name: openeuler-24.03-lts-rpms
            dockerfile: dockerfile.openeuler2403
          - name: openeuler-24.03-lts-sp1-rpms
            dockerfile: dockerfile.openeuler2403sp1
          - name: openeuler-24.03-lts-sp2-rpms
            dockerfile: dockerfile.openeuler2403sp2
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: iso-latest
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build iso image to local
        uses: docker/build-push-action@v7
        with:
          context: gen-repository-iso
          file: gen-repository-iso/${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          outputs: type=local,dest=./output

      - name: Prepare ISO artifacts
        shell: bash
        run: |
          mkdir -p iso
          mv ./output/linux_amd64/*.iso iso/${{ matrix.name }}-amd64.iso
          mv ./output/linux_arm64/*.iso iso/${{ matrix.name }}-arm64.iso
          cd iso && sha256sum *.iso > ${{ matrix.name }}.iso.sha256sum.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            iso/${{ matrix.name }}-amd64.iso
            iso/${{ matrix.name }}-arm64.iso
            iso/${{ matrix.name }}.iso.sha256sum.txt
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: build-iso
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
          pattern: "*"

      - name: Release and upload ISO packages
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: iso-latest
          name: iso-latest
          files: artifacts/**
          overwrite: true
